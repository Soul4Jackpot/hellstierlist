<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hell's Wager Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080508;--surface:#130a0d;--surface2:#1c0f12;--surface3:#251318;
  --border:#3d1a20;--border2:#5a2028;--text:#f0d8c0;--muted:#8a5a50;
  --dim:#5a3530;--fire1:#ff2200;--fire2:#ff6600;--fire3:#ffaa00;
  --fire4:#ffdd44;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(255,34,0,.15) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(255,102,0,.08) 0%,transparent 40%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px 60px}
.hd{text-align:center;padding:36px 20px 24px;border-bottom:1px solid var(--border2)}
.hd-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.6rem,8vw,5.5rem);line-height:1;letter-spacing:5px;display:inline-flex;flex-wrap:wrap;justify-content:center;gap:0 1px;cursor:default;user-select:none}
.hl{font-family:'Bebas Neue',sans-serif;display:inline-block;background:linear-gradient(180deg,var(--fire4) 0%,var(--fire3) 30%,var(--fire2) 65%,var(--fire1) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,100,0,.3));transition:filter .15s;position:relative}
.hl-word{display:inline-flex;white-space:nowrap}
.hl.space{width:.3em}
.hl:hover{filter:drop-shadow(0 0 28px rgba(255,80,0,.85)) drop-shadow(0 0 50px rgba(255,0,0,.4));animation:shake .15s ease infinite}
@keyframes shake{0%{transform:translate(0,0) rotate(0deg)}20%{transform:translate(-1px,1px) rotate(-1deg)}40%{transform:translate(1px,-1px) rotate(.8deg)}60%{transform:translate(-1px,1px) rotate(-.5deg)}80%{transform:translate(1px,1px) rotate(1deg)}100%{transform:translate(0,0) rotate(0deg)}}
.drip{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:3px;background:linear-gradient(180deg,#cc0000,#880000);border-radius:0 0 3px 3px;height:0;transition:height .25s ease}
.hl:hover .drip{height:16px;animation:dripAnim 1.2s ease infinite .15s}
@keyframes dripAnim{0%{height:16px}50%{height:24px}70%{height:24px;opacity:1}90%{height:24px;opacity:0}100%{height:16px;opacity:1}}
.hd-sep{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px auto 0;max-width:440px}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}}
.hd-sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.hd-sep-dot{color:var(--fire2);font-size:10px;letter-spacing:4px;opacity:.7}

.banner>*:not(.banner-bg){position:relative;z-index:1}
.banner{margin-top:24px;background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:20px 24px;text-align:center;position:relative;overflow:hidden}
.banner::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire1),var(--fire3),transparent);animation:fireline 3s ease-in-out infinite}
@keyframes fireline{0%,100%{opacity:.3;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}
.banner-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:8px;text-transform:uppercase;color:var(--fire2);margin-bottom:14px;opacity:.7}
.banner-amt{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,7vw,4.5rem);letter-spacing:4px;line-height:1;background:linear-gradient(180deg,var(--fire4) 0%,var(--fire3) 40%,var(--fire2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.banner-sub{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.banner-btn{display:inline-block;margin-top:14px;background:linear-gradient(135deg,var(--fire1),var(--fire2));color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:10px 28px;border-radius:2px;text-decoration:none;box-shadow:0 0 20px rgba(255,60,0,.3);transition:box-shadow .2s,transform .15s}
.banner-btn:hover{box-shadow:0 0 32px rgba(255,80,0,.5);transform:translateY(-1px)}
.banner-code{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:4px;color:var(--muted);margin-top:8px;text-transform:uppercase}
.banner-code strong{color:var(--fire3)}
.timer-wrap{display:flex;justify-content:space-between;align-items:center;margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:13px 18px;flex-wrap:wrap;gap:12px}
.timer-lbl{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.timer-units{display:flex;gap:6px;align-items:center}
.t-box{text-align:center}
.t-n{display:block;font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--fire3);background:var(--surface2);border:1px solid var(--border2);border-radius:2px;width:48px;height:42px;line-height:42px;font-variant-numeric:tabular-nums}
.t-l{font-size:.55rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.t-sep{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--fire2);margin-top:-8px;opacity:.6}
.timer-period{font-size:.7rem;color:var(--muted);letter-spacing:2px;text-align:right}
.sec-lbl{font-size:.58rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);opacity:.6}
.search{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;padding:10px 12px 10px 38px;outline:none;border-radius:2px;transition:border-color .2s}
.search:focus{border-color:var(--fire2)}
.search::placeholder{color:var(--muted);opacity:.6}
.tbl-wrap{background:var(--surface);border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl thead tr{background:var(--surface2);border-bottom:1px solid var(--border2)}
.tbl th{padding:10px 14px;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:left;font-weight:500}
.tbl th:nth-child(1){width:56px;text-align:center}
.tbl th:nth-child(3){text-align:right}
.tbl th:nth-child(4){text-align:right;width:110px}
.tbl tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
.tbl tbody tr:hover{background:rgba(255,60,0,.05)}
.tbl tbody tr:last-child{border-bottom:none}
.tbl td{padding:12px 14px;font-size:.82rem;color:var(--text)}
.tbl td:nth-child(1){text-align:center}
.tbl td:nth-child(3){text-align:right;color:var(--muted);font-size:.78rem}
.tbl td:nth-child(4){text-align:right}
.badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;border:1px solid}
.b1{color:var(--fire4);border-color:rgba(255,221,68,.35);background:rgba(255,221,68,.07)}
.b2{color:#b8c4cc;border-color:rgba(184,196,204,.3);background:rgba(184,196,204,.05)}
.b3{color:#c88c5a;border-color:rgba(200,140,90,.3);background:rgba(200,140,90,.06)}
.bn{color:var(--dim);border-color:var(--border);background:transparent}
.player{display:flex;align-items:center;gap:10px}
.av{width:28px;height:28px;border-radius:4px;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.75rem;color:var(--muted);flex-shrink:0}
.pv{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px}
.pv1{color:var(--fire4)}.pv2{color:#b8c4cc}.pv3{color:#c88c5a}.pvn{color:var(--fire2);opacity:.8}
.loading,.empty{text-align:center;padding:44px;color:var(--dim);font-size:.78rem;letter-spacing:3px;text-transform:uppercase}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--fire2);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="sparks-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
<div class="wrap">
  <div class="hd">
    <div class="hd-title" id="hd-title"></div>
    <div class="hd-sep"><div class="hd-sep-line"></div><span class="hd-sep-dot">✦ ⛧ ✦</span><div class="hd-sep-line"></div></div>
  </div>
  <div class="banner">
    <div class="banner-bg"></div>
    <div class="banner-eyebrow">⛧ Monthly Prize Pool ⛧</div>
    <div class="banner-amt">$500</div>
    <a class="banner-btn" href="https://menace.com/?r=SOUL4JACKPOT" target="_blank">Register Now</a>
    <div class="banner-code">Use code: <strong>SOUL4JACKPOT</strong></div>
  </div>
  <div class="timer-wrap">
    <div>
      <div class="timer-lbl">Time Remaining in Purgatory</div>
      <div class="timer-units">
        <div class="t-box"><span class="t-n" id="td">00</span></div>
        <span class="t-sep">:</span>
        <div class="t-box"><span class="t-n" id="th">00</span></div>
        <span class="t-sep">:</span>
        <div class="t-box"><span class="t-n" id="tm">00</span></div>
        <span class="t-sep">:</span>
        <div class="t-box"><span class="t-n" id="ts">00</span></div>
      </div>
    </div>
    <div class="timer-period">Apr 27 – May 24, 2026</div>
  </div>
  <div class="sec-lbl">⛧ The Damned Rankings</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search" id="srch" type="text" placeholder="Search by username..."/>
  </div>
  <div class="tbl-wrap">
    <div id="lb-state"><div class="loading"><div class="spinner"></div><br>Summoning the damned...</div></div>
    <table class="tbl" id="tbl" style="display:none">
      <thead><tr><th>Rank</th><th>Soul</th><th>Wagered</th><th>Prize</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('sparks-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  const COLORS=['#ff6600','#ff4400','#ffaa00','#ff2200','#ffcc00'];
  function spawn(){
    particles.push({
      x:rand(0,W),y:H+5,
      vx:rand(-0.4,0.4),vy:rand(-1.2,-0.4),
      size:rand(1,2.2),
      alpha:rand(0.4,0.9),
      life:1,decay:rand(0.004,0.01),
      color:COLORS[Math.floor(Math.random()*COLORS.length)]
    });
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.35)spawn();
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){
      p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
      ctx.globalAlpha=p.life*p.alpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  frame();
})();
(function(){
  const text="Hell's Wager Leaderboard";
  const el=document.getElementById('hd-title');
  const words=text.split(' ');
  words.forEach((word,wi)=>{
    const wordSpan=document.createElement('span');
    wordSpan.className='hl-word';
    word.split('').forEach(ch=>{
      const s=document.createElement('span');
      s.className='hl';
      s.textContent=ch;
      const drip=document.createElement('span');
      drip.className='drip';
      s.appendChild(drip);
      s.addEventListener('mousemove',e=>{
        for(let i=0;i<2;i++){
          const spark=document.createElement('span');
          spark.style.cssText=`position:fixed;width:3px;height:3px;border-radius:50%;background:#ff6600;pointer-events:none;z-index:999;left:${e.clientX+Math.random()*10-5}px;top:${e.clientY+Math.random()*10-5}px;animation:sparkFly .5s ease forwards;--sx:${(Math.random()-0.5)*30}px;--sy:${-Math.random()*30-10}px`;
          document.body.appendChild(spark);
          setTimeout(()=>spark.remove(),500);
        }
      });
      wordSpan.appendChild(s);
    });
    el.appendChild(wordSpan);
    if(wi<words.length-1){const sp=document.createElement('span');sp.className='hl space';el.appendChild(sp);}
  });
})();
const API='https://api-prod.gaze.bet/api/leaderboard/7K2YWCAGYNTW/1f490abd-e2e5-4f28-8aa7-baa62067cfdc?dateStart=2026-04-27&dateEnd=2026-05-24';
const PRIZES=[150,100,75,25,25,25,25,25,25,25];
const FALLBACK=[
  {player_id:'1',nickname:'Edikan42',wagered:167.68},
  {player_id:'2',nickname:'DarkLord_X',wagered:142.50},
  {player_id:'3',nickname:'Inferno99',wagered:98.30},
  {player_id:'4',nickname:'VoidWalker',wagered:74.10},
  {player_id:'5',nickname:'BloodMoon',wagered:55.80},
  {player_id:'6',nickname:'CryptoDevil',wagered:44.20},
  {player_id:'7',nickname:'LostSoul42',wagered:38.90},
  {player_id:'8',nickname:'HellRaiser',wagered:31.50},
  {player_id:'9',nickname:'Damnation_K',wagered:22.10},
  {player_id:'10',nickname:'AbyssGambler',wagered:15.40},
];
let all=[];
function fmt(n){if(n>=1000000)return'$'+(n/1000000).toFixed(2)+'M';if(n>=1000)return'$'+(n/1000).toFixed(2)+'K';return'$'+n.toFixed(2)}
function fmtP(i){return PRIZES[i]?'$'+PRIZES[i].toLocaleString():'—'}
function ini(n){return n.slice(0,2).toUpperCase()}
function bc(i){return i===0?'b1':i===1?'b2':i===2?'b3':'bn'}
function pc(i){return i===0?'pv1':i===1?'pv2':i===2?'pv3':'pvn'}
function render(list){
  const tb=document.getElementById('tbody');
  const st=document.getElementById('lb-state');
  const tbl=document.getElementById('tbl');
  st.innerHTML='';
  if(!list.length){st.innerHTML='<div class="empty">No souls found</div>';tbl.style.display='none';return}
  tbl.style.display='table';
  tb.innerHTML=list.map(p=>{
    const i=all.findIndex(x=>x.player_id===p.player_id);
    return`<tr>
      <td><span class="badge ${bc(i)}">${i+1}</span></td>
      <td><div class="player"><span>${p.nickname}</span></div></td>
      <td>${fmt(p.wagered)}</td>
      <td><span class="pv ${pc(i)}">${fmtP(i)}</span></td>
    </tr>`;
  }).join('');
}
async function load(){
  try{
    const r=await fetch(API);
    if(!r.ok)throw 0;
    const d=await r.json();
    all=d.leaderboard&&d.leaderboard.length?d.leaderboard:FALLBACK;
  }catch{all=FALLBACK;}
  document.getElementById('lb-state').innerHTML='';
  render(all);
}
document.getElementById('srch').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  render(q?all.filter(p=>p.nickname.toLowerCase().includes(q)):all);
});
function tick(){
  const end=new Date('2026-05-24T23:59:59Z');
  let d=Math.max(0,Math.floor((end-new Date())/1000));
  const dd=Math.floor(d/86400);d-=dd*86400;
  const hh=Math.floor(d/3600);d-=hh*3600;
  const mm=Math.floor(d/60);d-=mm*60;
  document.getElementById('td').textContent=String(dd).padStart(2,'0');
  document.getElementById('th').textContent=String(hh).padStart(2,'0');
  document.getElementById('tm').textContent=String(mm).padStart(2,'0');
  document.getElementById('ts').textContent=String(d).padStart(2,'0');
}
tick();setInterval(tick,1000);
load();setInterval(load,5*60*1000);
</script>
</body>
</html>
